name: Test Pipeline
run-name: Testing github actions

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose the action to perform"
        required: true
        type: choice
        options:
          - ONE
          - TWO
          - THREE

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Stage ONE
        if: ${{ github.event.inputs.action == 'ONE' }}
        run: echo Hello, world! stage one

      - name: Stage TWO
        if: ${{ github.event.inputs.action == 'TWO' }}
        run: echo Hello, world! stage two

      - name: Stage THREE
        if: ${{ github.event.inputs.action == 'THREE' }}
        run: echo Hello, world! stage three