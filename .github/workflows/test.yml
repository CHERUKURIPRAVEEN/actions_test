name: Terraform Pipeline
run-name: Deploy Infrastructure
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      deployment_action:
        description: "Terraform Action"
        required: true
        type: choice
        options:
          - plan
          - apply
      
      destroy:
        description: "Destroy Terraform resources"
        required: false
        type: boolean
        default: false

      target_resource:
        description: "Terraform resource address to destroy. Use 'all' to destroy everything."
        required: false
        type: string
        default: "all" 
    
env:
 TF_LOG: INFO
 AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
 AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
 TF_WORKING_DIR: .
 TF_VERSION: 1.12.2
 TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Install Terraform
        run: |
          TF_VERSION=${{ env.TF_VERSION }}
          echo "Installing Terraform ${TF_VERSION}"
          wget -q https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
          unzip -o terraform_${TF_VERSION}_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Initialize
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        run: |
          TFLINT_VERSION=0.55.1
          echo "Installing TFLint ${TFLINT_VERSION}"
          wget -q https://github.com/terraform-linters/tflint/releases/download/v${TFLINT_VERSION}/tflint_linux_amd64.zip
          unzip -o tflint_linux_amd64.zip
          sudo mv tflint /usr/local/bin/
          tflint --version

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Install Checkov Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 \
            python3-pip \
            python3-venv \
            python3-full
          python3 -m venv .checkov-env
          .checkov-env/bin/python -m pip install --upgrade pip
          .checkov-env/bin/pip install checkov
          .checkov-env/bin/checkov --version

      - name: Run Checkov
        run: checkov -d .  --skip-check CKV_GHA_7,CKV_TF_1

  plan:
    if: github.event.inputs.deployment_action == 'plan' || github.event.inputs.deployment_action == 'apply'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Plugin Cache Directory
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-
      
      - name: Terraform Initialize
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan -var-file=variables/dev.tfvars -out=tfplan
      
      - name: Show Terraform Plan
        run: terraform show -no-color tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
  
  approval:
    if: github.event.inputs.deployment_action == 'apply'
    needs: plan
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Waiting for Approval
        run: echo "Approved. Proceeding to deployment."
  

  apply:
    if: github.event.inputs.deployment_action == 'apply'
    needs: approval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Plugin Cache Directory
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-
      
      - name: Terraform Initialize
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  destroy:
    needs: apply
    runs-on: ubuntu-latest
    if: github.event.inputs.destroy == 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Plugin Cache Directory
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-
      
      - name: Terraform Initialize
        run: terraform init

      - name: Terraform Destroy
        run: |
          if [ "${{ github.event.inputs.target_resource }}" = "all" ]; then
            terraform destroy \
              -var-file=variables/dev.tfvars \
              -auto-approve
          else
            terraform destroy \
              -var-file=variables/dev.tfvars \
              -target="${{ github.event.inputs.target_resource }}" \
              -auto-approve
          fi